<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AWS Cert Prep Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ THEME TOKENS ═══ */
:root {
  --mono:'JetBrains Mono',monospace; --sans:'Plus Jakarta Sans',sans-serif; --display:'Syne',sans-serif;
  --header-h:58px; --tabs-h:50px; --footer-h:60px;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
  --tt:background .25s,color .25s,border-color .25s,box-shadow .25s,opacity .25s;
  --yellow:#f59e0b;
}
/* Dark mode accents — brighter, vivid on dark */
[data-theme="dark"] {
  --aif-accent:#f59e0b;
  --mla-accent:#a78bfa;
  --dea-accent:#60a5fa;
  --green:#22c55e;
  --red:#f87171;
}
/* Light mode accents */
[data-theme="light"] {
  --aif-accent:#b45309;
  --mla-accent:#6d28d9;
  --dea-accent:#1d4ed8;
  --green:#15803d;
  --red:#b91c1c;
}
[data-theme="dark"] {
  --bg:#070b12;
  --surface:#0d1421;
  --surface2:#121c2e;
  --surface3:#182036;
  --border:#1d2d44;
  --border-bright:#253650;
  --text:#e2eaf6;
  --text-secondary:#8a9cc0;
  --muted:#445a78;
  --grid:rgba(96,165,250,0.035);
  --nav-bg:rgba(7,11,18,0.96);
  --shadow:0 20px 60px rgba(0,0,0,0.7),0 4px 16px rgba(0,0,0,0.4);
  --shadow-sm:0 4px 16px rgba(0,0,0,0.4);
  --footer-bg:rgba(7,11,18,0.98);
  --card-shine:linear-gradient(135deg,rgba(255,255,255,0.025) 0%,transparent 60%);
}
[data-theme="light"] {
  --bg:#f1f5f9;
  --surface:#ffffff;
  --surface2:#f8fafc;
  --surface3:#f1f5f9;
  --border:#e2e8f0;
  --border-bright:#cbd5e1;
  --text:#0f172a;
  --text-secondary:#334155;
  --muted:#64748b;
  --grid:rgba(15,23,42,0.04);
  --nav-bg:rgba(255,255,255,0.95);
  --shadow:0 4px 24px rgba(15,23,42,0.08),0 1px 4px rgba(15,23,42,0.05);
  --shadow-sm:0 1px 4px rgba(15,23,42,0.06);
  --footer-bg:rgba(255,255,255,0.98);
  --card-shine:none;
}

/* ═══ RESET ═══ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;transition:var(--tt);font-size:14px;letter-spacing:0.01em}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;z-index:0}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle{position:relative;width:50px;height:26px;flex-shrink:0;cursor:pointer}
.theme-toggle input{opacity:0;width:0;height:0;position:absolute}
.toggle-track{position:absolute;inset:0;border-radius:13px;background:var(--surface2);border:1px solid var(--border);transition:all .3s;overflow:hidden}
.toggle-track::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:var(--text);top:2px;left:2px;transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 2px 6px rgba(0,0,0,.25)}

/* ═══ VIEWS ═══ */
.view{position:fixed;inset:0;display:none;flex-direction:column;z-index:1}
.view.active{display:flex}

/* ═══ HOME ═══ */
#view-home{overflow-y:auto}
.home-nav{position:sticky;top:0;z-index:100;height:var(--header-h);background:var(--nav-bg);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:14px;}
.home-logo{font-family:var(--display);font-size:19px;font-weight:800;flex:1;color:var(--text)}
.home-logo .hl{color:var(--aif-accent)}

.exam-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;padding:2rem 24px 5rem;max-width:980px;margin:0 auto}
.exam-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:2rem;cursor:pointer;position:relative;overflow:hidden;transition:all .22s;}
.exam-card.mla::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--mla-accent),#c4b5fd)}

/* ═══ EXAM VIEW ═══ */
.exam-header{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--header-h);background:var(--nav-bg);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;}
.mode-tabs-bar{position:fixed;top:var(--header-h);left:0;right:0;z-index:299;height:var(--tabs-h);background:var(--nav-bg);backdrop-filter:blur(24px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;}
.mode-tab-btn{flex:1;height:36px;border:1px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.mode-tab-btn.active-tab{background:rgba(167,139,250,.1);border-color:var(--mla-accent);color:var(--mla-accent)}

.exam-content-area{position:fixed;top:calc(var(--header-h) + var(--tabs-h));left:0;right:0;bottom:0;display:flex;}
.quiz-panel{flex:1;display:none;overflow-y:auto;padding:18px 14px;}
.quiz-panel.active{display:block}

/* NOTES SPECIFIC STYLES */
#notes-panel { padding: 0; background: var(--bg); }
.pdf-container { width: 100%; height: 100%; border: none; }
#tab-notes { display: none; } /* Hidden by default, shown for MLA */
.exam-mla #tab-notes { display: flex; }

</style>
</head>
<body>

<div id="view-home" class="view active">
  <nav class="home-nav">
    <div class="home-logo"><span class="hl">AWS</span> Cert Prep Hub</div>
    <div class="theme-toggle" onclick="toggleTheme(this.querySelector('input'))">
      <input type="checkbox" id="theme-cb-home">
      <div class="toggle-track"></div>
    </div>
  </nav>
  <div class="exam-grid">
    <div class="exam-card mla" onclick="openExam('mla')">
       <div class="exam-badge">Associate</div>
       <h2>ML Engineer Associate</h2>
       <p>Master AWS Machine Learning services and ingestion pipelines.</p>
    </div>
  </div>
</div>

<div id="view-exam" class="view">
  <header class="exam-header">
    <button class="back-btn" onclick="goHome()">← Back</button>
    <div id="exam-header-title" class="exam-header-title">Exam Name</div>
    <div id="exam-header-badge" class="exam-header-badge">CODE</div>
  </header>

  <nav class="mode-tabs-bar">
    <button class="mode-tab-btn" id="tab-quiz" onclick="switchMode('quiz')">Quiz</button>
    <button class="mode-tab-btn" id="tab-rev" onclick="switchMode('revision')">Revision</button>
    <button class="mode-tab-btn" id="tab-notes" onclick="switchMode('notes')">📝 Notes</button>
  </nav>

  <main id="exam-content-area" class="exam-content-area">
    <div id="quiz-panel" class="quiz-panel active">
      <div id="quiz-config">
          <h2 style="margin-bottom:10px">Exam Preparation</h2>
          <p>Select your topics and start the practice exam.</p>
          <button style="margin-top:20px; padding:10px 20px; background:var(--mla-accent); border:none; border-radius:8px; color:white; cursor:pointer;" onclick="alert('Quiz feature active')">Launch Quiz</button>
      </div>
    </div>
    
    <div id="revision-panel" class="quiz-panel">
      <h2>Revision Mode</h2>
      <p>Review all questions and answers here.</p>
    </div>

    <div id="notes-panel" class="quiz-panel">
      <iframe 
        id="pdf-viewer"
        src="AWS_ML_Section2_Data_Ingestion_Storage.pdf" 
        class="pdf-container">
      </iframe>
    </div>
  </main>
</div>

<script>
let currentExam = null;
let currentMode = 'quiz';

function openExam(id) {
  currentExam = id;
  document.getElementById('view-home').classList.remove('active');
  document.getElementById('view-exam').classList.add('active');
  document.getElementById('view-exam').className = 'view active exam-' + id;
  
  const titles = { mla: 'ML Engineer Associate' };
  const badges = { mla: 'MLA-C01' };
  
  document.getElementById('exam-header-title').textContent = titles[id];
  document.getElementById('exam-header-badge').textContent = badges[id];
  
  switchMode('quiz');
}

function goHome() {
  document.getElementById('view-exam').classList.remove('active');
  document.getElementById('view-home').classList.add('active');
}

function switchMode(mode) {
  currentMode = mode;
  
  // Update Tab Buttons
  document.querySelectorAll('.mode-tab-btn').forEach(btn => btn.classList.remove('active-tab'));
  document.getElementById('tab-' + mode).classList.add('active-tab');
  
  // Update Panels
  document.querySelectorAll('.quiz-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(mode + '-panel').classList.add('active');
}

function toggleTheme(cb) {
  const dark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.documentElement.setAttribute('data-theme', dark ? 'light' : 'dark');
  cb.checked = dark;
}
</script>

</body>
</html>
